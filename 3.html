<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>המקלט - פיענוח סופי</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Assistant:wght@200;400;700&family=Courier+Prime&display=swap');
        
        body {
            background-color: #050505;
            color: #4ade80;
            font-family: 'Courier Prime', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .crt-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
            z-index: 10;
        }

        .screen {
            width: 90%;
            max-width: 600px;
            padding: 2rem;
            border: 2px solid #14532d;
            background-color: #061006;
            box-shadow: 0 0 20px rgba(74, 222, 128, 0.1);
            position: relative;
        }

        .scanline {
            width: 100%;
            height: 2px;
            background: rgba(74, 222, 128, 0.1);
            position: absolute;
            animation: scan 4s linear infinite;
        }

        @keyframes scan {
            from { top: 0; }
            to { top: 100%; }
        }

        input {
            background: #000;
            border: 1px solid #14532d;
            color: #4ade80;
            padding: 0.5rem;
            width: 100%;
            margin-bottom: 1rem;
            outline: none;
        }

        .glitch {
            animation: glitch 1s linear infinite;
        }

        @keyframes glitch {
            2%, 64% { transform: translate(2px,0) skew(0deg); }
            4%, 60% { transform: translate(-2px,0) skew(0deg); }
            62% { transform: translate(0,0) skew(5deg); }
        }

        #finalMessage {
            display: none;
        }
    </style>
</head>
<body>
    <div class="crt-overlay"></div>
    <div class="scanline"></div>

    <div class="screen">
        <div id="setup">
            <h1 class="text-xl mb-6 border-b border-green-900 pb-2">JANUS_RECEIVER_v4.0</h1>
            <p class="text-xs mb-4">נדרש סינכרון שני ערוצי נתונים (Alpha & Beta):</p>
            
            <div class="space-y-4">
                <div>
                    <label class="text-[10px] block mb-1">CHANNEL_ALPHA_KEY:</label>
                    <input type="text" id="key1" placeholder="ENTER KEY 1" class="text-sm">
                </div>
                <div>
                    <label class="text-[10px] block mb-1">CHANNEL_BETA_KEY:</label>
                    <input type="text" id="key2" placeholder="ENTER KEY 2" class="text-sm">
                </div>
                <button onclick="sync()" class="w-full border border-green-400 py-2 hover:bg-green-400 hover:text-black transition-all text-sm font-bold">START_SYNC</button>
            </div>
            <p id="error" class="text-red-600 text-[10px] mt-4 h-4"></p>
        </div>

        <div id="finalMessage" class="space-y-4">
            <div class="glitch text-lg font-bold">סינכרון הושלם.</div>
            <p class="text-sm leading-relaxed text-green-200">
                "אם אתם קוראים את זה, האלגוריתם עבד. גלי הרדיו של 1994 כבר לא לכודים. אני לא נעלמתי, פשוט הפכתי למידע. חפשו אותי בין השורות של הקוד הבא..."
            </p>
            <div class="p-4 bg-green-900/20 border border-green-500/50 mt-6">
                <p class="text-xs">מיקום פיזי אחרון שזוהה:</p>
                <p class="text-xl tracking-widest font-bold">32.0722° N, 34.7749° E</p>
                 <a href="4.html" class="next-level-btn terminal">
                Next step 
                </a>
            </div>
            <button onclick="location.reload()" class="text-[10px] underline mt-8 opacity-50">REBOOT_SYSTEM</button>
        </div>
    </div>

    <script>
        function sync() {
            const k1 = document.getElementById('key1').value.trim().toUpperCase();
            const k2 = document.getElementById('key2').value.trim().toUpperCase();
            const err = document.getElementById('error');

            if (k1 === "ECHO_IN_THE_ARCHIVE_94" && k2 === "RESONANCE_FREQ_432") {
                document.getElementById('setup').style.display = 'none';
                document.getElementById('finalMessage').style.display = 'block';
                // צליל סטטי קצר (אופציונלי אם היה קובץ שמע)
            } else {
                err.innerText = "ERROR: PHASE_MISMATCH - KEYS DO NOT ALIGN";
                setTimeout(() => err.innerText = "", 2000);
            }
        }
    </script>
</body>
</html>
